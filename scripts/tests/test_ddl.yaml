name: "Test: DDL Operations"
database: test_ddl
tests:
  # CREATE TABLE on OLD, read on NEW
  - desc: "Create table on OLD"
    port: OLD
    sql: "CREATE TABLE test_ddl.t1 (a INT, b VARCHAR)"
    expect: ok

  - desc: "Insert on OLD"
    port: OLD
    sql: "INSERT INTO test_ddl.t1 VALUES (1,'hello'),(2,'world')"
    expect: ok

  - desc: "NEW reads OLD table"
    port: NEW
    sql: "SELECT b FROM test_ddl.t1 WHERE a=1"
    expect: eq
    value: "hello"

  # ALTER TABLE ADD COLUMN on NEW
  - desc: "Add column on NEW"
    port: NEW
    sql: "ALTER TABLE test_ddl.t1 ADD COLUMN c FLOAT DEFAULT 0.0"
    expect: ok

  - desc: "OLD sees altered schema"
    port: OLD
    sql: "DESCRIBE test_ddl.t1"
    expect: ok

  # CREATE TABLE on NEW, DDL visible on OLD
  - desc: "Create table on NEW"
    port: NEW
    sql: "CREATE TABLE test_ddl.t2 (x INT, y VARCHAR, z DATE)"
    expect: ok

  - desc: "OLD sees NEW-created table schema"
    port: OLD
    sql: "DESCRIBE test_ddl.t2"
    expect: ok

  - desc: "OLD inserts into NEW-created table"
    port: OLD
    sql: "INSERT INTO test_ddl.t2 VALUES (1,'test','2024-01-01')"
    expect: ok

  - desc: "OLD reads own insert in NEW-created table"
    port: OLD
    sql: "SELECT y FROM test_ddl.t2 WHERE x=1"
    expect: eq
    value: "test"

  - desc: "NEW reads OLD insert"
    port: NEW
    sql: "SELECT y FROM test_ddl.t2 WHERE x=1"
    expect: eq
    value: "test"

  # DROP COLUMN on OLD
  - desc: "Drop column on OLD"
    port: OLD
    sql: "ALTER TABLE test_ddl.t1 DROP COLUMN c"
    expect: ok

  - desc: "NEW sees schema after column drop"
    port: NEW
    sql: "DESCRIBE test_ddl.t1"
    expect: ok

  # RENAME TABLE on NEW
  - desc: "Rename table on NEW"
    port: NEW
    sql: "ALTER TABLE test_ddl.t2 RENAME TO t2_renamed"
    expect: ok

  - desc: "OLD sees renamed table"
    port: OLD
    sql: "DESCRIBE test_ddl.t2_renamed"
    expect: ok

  - desc: "Old name should fail on OLD"
    port: OLD
    sql: "SELECT * FROM test_ddl.t2 LIMIT 1"
    expect: fail

  # VIEW: create on NEW, query on OLD
  - desc: "Create view on NEW"
    port: NEW
    sql: "CREATE VIEW test_ddl.v1 AS SELECT a, b FROM test_ddl.t1 WHERE a > 0"
    expect: ok

  - desc: "OLD queries NEW-created view"
    port: OLD
    sql: "SELECT * FROM test_ddl.v1"
    expect: ok

  # CREATE TABLE with cluster key
  - desc: "Create clustered table on OLD"
    port: OLD
    sql: "CREATE TABLE test_ddl.clustered (id INT, ts TIMESTAMP, v VARCHAR) CLUSTER BY(id, ts)"
    expect: ok

  - desc: "Insert into clustered table on OLD"
    port: OLD
    sql: "INSERT INTO test_ddl.clustered VALUES (1,'2024-01-01 00:00:00','a')"
    expect: ok

  - desc: "NEW reads clustered table"
    port: NEW
    sql: "SELECT v FROM test_ddl.clustered WHERE id=1"
    expect: eq
    value: "a"

  # TRUNCATE on NEW
  - desc: "Truncate on NEW"
    port: NEW
    sql: "TRUNCATE TABLE test_ddl.t1"
    expect: ok

  - desc: "OLD verifies truncate"
    port: OLD
    sql: "SELECT count(*) FROM test_ddl.t1"
    expect: eq
    value: "0"

  # Database operations
  - desc: "Create database on NEW"
    port: NEW
    sql: "CREATE DATABASE test_ddl_new"
    expect: ok

  - desc: "OLD sees NEW-created database"
    port: OLD
    sql: "SHOW DATABASES"
    expect: ok

  - desc: "OLD drops NEW-created database"
    port: OLD
    sql: "DROP DATABASE test_ddl_new"
    expect: ok
