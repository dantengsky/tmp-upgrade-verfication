# Local Docker environment to simulate distributed mode.
# 7 containers: 1 ctl + 3 meta + 3 query, all on a shared network.
# ctl has SSH access to all other containers via key-based auth.
#
# Prerequisites:
#   mkdir -p .docker/ssh && ssh-keygen -t ed25519 -f .docker/ssh/id_ed25519 -N "" -q
#
# Usage:
#   docker compose up -d
#   docker compose exec ctl bash
#   # inside ctl:
#   export $(grep -v '^#' /workspace/.env | xargs)
#   python3 /workspace/scripts/run.py --mode distributed \
#     --meta-hosts meta1,meta2,meta3 \
#     --query-hosts query1,query2,query3

x-node: &node-base
  image: ubuntu:22.04
  init: true
  volumes:
    - shared-bin:/shared-bin
    - ./.docker/ssh/id_ed25519.pub:/tmp/ssh_pubkey:ro
  networks:
    - upgrade-net
  entrypoint: ["/bin/bash", "-c"]
  command:
    - |
      apt-get update -qq && apt-get install -y -qq openssh-server curl rsync >/dev/null 2>&1
      mkdir -p /run/sshd /root/.ssh
      cp /tmp/ssh_pubkey /root/.ssh/authorized_keys
      chmod 600 /root/.ssh/authorized_keys
      exec /usr/sbin/sshd -D -e

services:
  ctl:
    image: ubuntu:22.04
    init: true
    hostname: ctl
    volumes:
      - .:/workspace
      - shared-bin:/shared-bin
      - ./.docker/ssh/id_ed25519:/tmp/ssh_key:ro
    networks:
      - upgrade-net
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        apt-get update -qq && apt-get install -y -qq openssh-client mysql-client python3 python3-pip curl rsync >/dev/null 2>&1
        pip3 install -q pyyaml
        mkdir -p /root/.ssh && cp /tmp/ssh_key /root/.ssh/id_ed25519 && chmod 600 /root/.ssh/id_ed25519
        echo "CTL ready. Use 'docker compose exec ctl bash' to enter."
        tail -f /dev/null
    depends_on:
      - meta1
      - meta2
      - meta3
      - query1
      - query2
      - query3

  meta1:
    <<: *node-base
    hostname: meta1

  meta2:
    <<: *node-base
    hostname: meta2

  meta3:
    <<: *node-base
    hostname: meta3

  query1:
    <<: *node-base
    hostname: query1

  query2:
    <<: *node-base
    hostname: query2

  query3:
    <<: *node-base
    hostname: query3

volumes:
  shared-bin:

networks:
  upgrade-net:
    driver: bridge
